name: Build & Push Assets

on:
  push:
    branches: [master]
    paths:
      - 'resources/**'
      - 'package.json'
      - 'vite.config.js'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Commit & push build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/build
          git diff --staged --quiet || git commit -m "chore: auto-build assets [skip ci]"
          git push
